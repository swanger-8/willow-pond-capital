<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Willow Pond Capital, LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1c3d2a;
      --gold: #c9a84c;
      --gold-light: #d4b96a;
      --off-white: #f5f0e8;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #0a0c0b;
    }

    /* ── Video background ── */
    .video-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }

    .video-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .mobile-bg {
      display: none;
    }

    .video-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(5,14,8,0.55) 0%, rgba(5,14,8,0.40) 40%, rgba(5,14,8,0.50) 100%);
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: linear-gradient(to bottom, rgba(5,14,8,0.70) 0%, transparent 100%);
    }

    .logo-area {
      display: flex;
      align-items: center;
      width: 280px;
      padding: 24px;
    }

    .logo-text { font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--off-white); opacity: 0.9; line-height: 1.3; }
    .logo-text span { display: block; font-size: 10px; font-weight: 300; letter-spacing: 0.22em; opacity: 0.65; margin-top: 2px; }

    .contact-btn {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px; font-weight: 400; font-style: italic; letter-spacing: 0.15em;
      color: var(--gold-light); background: transparent; border: none;
      border-bottom: 1px solid rgba(201,168,76,0.5);
      padding: 4px 0; cursor: pointer;
      transition: color 0.25s, border-color 0.25s;
      text-decoration: none; display: inline-block;
    }
    .contact-btn:hover { color: var(--off-white); border-bottom-color: var(--gold); }

    /* ── Main content ── */
    main {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      pointer-events: none;
    }

    .mobile-center-logo { display: none; }

    .company-block { text-align: center; pointer-events: auto; }

    .company-name {
      font-size: clamp(20px, 2.6vw, 46px);
      font-weight: 600; font-variant: small-caps; letter-spacing: 0.20em;
      color: var(--off-white); line-height: 1;
      text-shadow: 0 2px 24px rgba(0,0,0,0.4);
      white-space: nowrap;
    }

    .company-tagline {
      margin-top: 20px; font-size: clamp(14px, 1.5vw, 20px);
      font-weight: 300; font-style: italic;
      color: rgba(245,240,232,0.65); letter-spacing: 0.10em;
    }

    .divider {
      width: 1px; height: 64px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 48px 0; pointer-events: none;
    }

    .office-block { text-align: center; pointer-events: auto; }

    .office-block .contact-btn {
      pointer-events: auto;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px; font-weight: 500; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--off-white);
      background: transparent; border: 1px solid var(--gold);
      padding: 10px 28px; cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .office-block .contact-btn:hover { background: rgba(201,168,76,0.15); }

    .office-label { font-size: 10px; font-weight: 500; letter-spacing: 0.30em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
    .office-address { font-size: clamp(13px,1.3vw,17px); font-weight: 400; color: var(--off-white); line-height: 1.9; letter-spacing: 0.06em; opacity: 0.85; }

    /* ── Contact modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(5,14,8,0.85);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s; backdrop-filter: blur(4px);
    }
    .modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: #0e2018; border: 1px solid rgba(201,168,76,0.3);
      padding: 56px 64px; max-width: 480px; width: 90%; text-align: center;
      transform: translateY(16px); transition: transform 0.35s;
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title { font-size: 11px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 32px; }
    .modal-close {
      margin-top: 40px; display: block;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 10px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(245,240,232,0.4); background: none; border: none; cursor: pointer; transition: color 0.2s;
    }
    .modal-close:hover { color: rgba(245,240,232,0.8); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      /* Full screen image - covers everything including notch/bars */
      .mobile-bg {
        display: block;
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        object-fit: cover;
        object-position: center center;
        z-index: 0;
      }
      html, body {
        height: 100dvh;
        overflow: hidden;
      }
      .video-wrap {
        height: 100dvh;
      }
      /* Hide looping video */
      .video-wrap video { display: none; }
      /* Hide desktop nav */
      nav { display: none; }
      /* Hide company text and divider */
      .company-block { display: none; }
      .divider { display: none; }
      /* Big centered logo */
      .mobile-center-logo {
        display: block;
        width: 220px;
        height: auto;
        filter: brightness(0) invert(1);
        margin-bottom: 40px;
        pointer-events: none;
      }
    }
  </style>
</head>

      if (res.ok) {
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('formSuccess').style.display = 'block';
      }
    });
  </script>

  <div id="tweaks-root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"overlayDark":50,"goldColor":"#c9a84c","companySize":48,"showLocation":true,"contactStyle":"italic-underline"}/*EDITMODE-END*/;
    function WillowTweaks() {
      const [tweaks, setTweakFn] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => {
        const alpha = (tweaks.overlayDark / 100).toFixed(2);
        const a1 = Math.min(parseFloat(alpha) + 0.15, 1).toFixed(2);
        document.querySelector('.video-wrap').style.setProperty('--overlay-alpha', alpha);
        document.documentElement.style.setProperty('--gold', tweaks.goldColor);
        document.documentElement.style.setProperty('--gold-light', tweaks.goldColor);
        const cn = document.querySelector('.company-name');
        if (cn) cn.style.fontSize = tweaks.companySize + 'px';
        const loc = document.querySelector('.office-address');
        if (loc) loc.style.display = tweaks.showLocation ? '' : 'none';
        let st = document.getElementById('tweak-overlay-style');
        if (!st) { st = document.createElement('style'); st.id = 'tweak-overlay-style'; document.head.appendChild(st); }
        st.textContent = `.video-wrap::after { background: linear-gradient(to bottom, rgba(5,14,8,${a1}) 0%, rgba(5,14,8,${alpha}) 40%, rgba(5,14,8,${alpha}) 100%) !important; }`;
      }, [tweaks]);
      return (
        <TweaksPanel>
          <TweakSlider label="Overlay darkness" id="overlayDark" value={tweaks.overlayDark} min={20} max={85} step={5} onChange={v => setTweakFn('overlayDark', v)} />
          <TweakColor label="Gold accent" id="goldColor" value={tweaks.goldColor} onChange={v => setTweakFn('goldColor', v)} />
          <TweakSlider label="Company name size" id="companySize" value={tweaks.companySize} min={24} max={72} step={2} onChange={v => setTweakFn('companySize', v)} />
          <TweakToggle label="Show city" id="showLocation" value={tweaks.showLocation} onChange={v => setTweakFn('showLocation', v)} />
        </TweaksPanel>
      );
    }
    ReactDOM.createRoot(document.getElementById('tweaks-root')).render(<WillowTweaks />);
  </script>

  <script>
    (function() {
      const v1 = document.getElementById('vid1');
      const v2 = document.getElementById('vid2');
      let active = v1, standby = v2;
      function prep() {
        if (!standby.duration) return;
        if (active.duration - active.currentTime <= 0.5) {
          standby.currentTime = 0; standby.play();
          active.removeEventListener('timeupdate', prep);
          active.addEventListener('ended', swap, { once: true });
        }
      }
      function swap() {
        standby.style.opacity = '1'; active.style.opacity = '0';
        active.pause(); active.currentTime = 0;
        const tmp = active; active = standby; standby = tmp;
        active.addEventListener('timeupdate', prep);
      }
      v1.addEventListener('canplaythrough', () => { v1.play(); v1.addEventListener('timeupdate', prep); }, { once: true });
    })();
    const btn = document.getElementById('contactBtn');
    const backdrop = document.getElementById('modalBackdrop');
    const close = document.getElementById('modalClose');
    btn.addEventListener('click', () => backdrop.classList.add('open'));
    close.addEventListener('click', () => backdrop.classList.remove('open'));
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.classList.remove('open'); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') backdrop.classList.remove('open'); });
  </script>

</body>
